<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-POP Clock & Wallpaper</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --pink-50:#FFF0F5;--pink-100:#FFE4ED;--pink-200:#FFD6E4;--pink-300:#FFC0D6;
            --pink-400:#FFa0c0;--pink-500:#FF7EB3;--pink-600:#FF5BA0;--pink-hot:#FF2D87;
            --gold-text:#D4AF37;--gold-light:#F0D88A;--mint:#A8E6CF;--mint-light:#D0F0E0;
            --lavender:#E8D5F5;--charcoal:#2D2D2D;--text-light:#999;--text-medium:#8B6090;
        }
        body{font-family:'Heebo',sans-serif;background:var(--pink-50);min-height:100vh;color:var(--charcoal);}

        /* ===== SECTIONS (your existing styles) ===== */
        .section{display:none;padding:24px 20px;max-width:850px;margin:0 auto;animation:fadeIn 0.4s;position:relative;z-index:1;}
        .section.active{display:block;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        .section-title{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--charcoal);text-align:center;margin-bottom:8px;font-weight:600;letter-spacing:1px;}
        .section-subtitle{text-align:center;color:var(--text-light);font-size:13px;margin-bottom:22px;font-weight:300;letter-spacing:1px;text-transform:uppercase;font-family:'Heebo';}
        .section-divider{width:50px;height:2px;background:var(--gold-text);margin:0 auto 22px;opacity:0.5;}

        /* Demo nav */
        .demo-nav{display:flex;justify-content:center;gap:10px;padding:20px;}
        .demo-nav button{padding:10px 24px;border:2px solid var(--pink-200);background:#fff;border-radius:30px;font-family:'Outfit';font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;color:var(--text-light);transition:all 0.3s;}
        .demo-nav button:hover{border-color:var(--pink-500);color:var(--pink-600);}
        .demo-nav button.active{background:var(--pink-500);border-color:var(--pink-500);color:#fff;box-shadow:0 4px 20px rgba(255,126,179,0.25);}

        /* ===== SMARTWATCH ===== */
        .watch-page{display:flex;flex-direction:column;align-items:center;padding-bottom:30px;}
        .watch-outer{position:relative;width:280px;margin:0 auto;}
        .watch-band{width:105px;height:50px;margin:0 auto;background:var(--pink-200);position:relative;overflow:hidden;}
        .watch-band::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.3) 0px,rgba(255,255,255,0.3) 2px,transparent 2px,transparent 7px);}
        .watch-band.top{border-radius:22px 22px 6px 6px;box-shadow:inset 0 4px 10px rgba(200,150,170,0.12);}
        .watch-band.bottom{border-radius:6px 6px 22px 22px;box-shadow:inset 0 -4px 10px rgba(200,150,170,0.12);}
        .watch-case{width:260px;height:280px;margin:0 auto;background:#fff;border-radius:52px;border:3px solid var(--pink-200);position:relative;box-shadow:0 8px 30px rgba(255,126,179,0.1),inset 0 1px 0 rgba(255,255,255,0.8);}
        .watch-btn-side{position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:7px;height:36px;background:var(--pink-300);border-radius:4px 0 0 4px;}
        .watch-screen{position:absolute;inset:14px;border-radius:40px;background:var(--pink-50);overflow:hidden;}

        .watch-face{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;position:relative;}
        .watch-face::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,var(--pink-200),transparent,var(--lavender),transparent);animation:watchGlow 8s linear infinite;opacity:0.1;}
        @keyframes watchGlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

        /* Characters BG inside watch */
        .watch-chars-bg{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:90%;z-index:1;opacity:0.2;pointer-events:none;filter:saturate(0.7);}

        .watch-status-bar{display:flex;justify-content:space-between;width:100%;padding:0 8px;font-size:10px;color:var(--text-light);position:relative;z-index:5;font-family:'Outfit';font-weight:600;}
        .watch-time-main{font-family:'Orbitron';font-size:48px;font-weight:900;letter-spacing:2px;position:relative;z-index:5;color:var(--pink-hot);margin:0;text-shadow:0 2px 12px rgba(255,45,135,0.12);line-height:1;}
        .watch-seconds{font-family:'Orbitron';font-size:15px;font-weight:700;color:var(--pink-400);position:relative;z-index:5;margin-top:0;}
        .watch-date{font-family:'Outfit';font-size:10px;color:var(--text-medium);letter-spacing:2px;text-transform:uppercase;position:relative;z-index:5;margin-top:2px;font-weight:600;}
        .watch-day{font-family:'Outfit';font-size:9px;color:var(--pink-500);letter-spacing:3px;text-transform:uppercase;position:relative;z-index:5;margin-top:1px;font-weight:700;}

        .watch-kpop-bar{display:flex;align-items:center;gap:7px;margin-top:5px;padding:4px 12px;background:rgba(255,228,237,0.85);border:1.5px solid var(--pink-200);border-radius:20px;position:relative;z-index:5;backdrop-filter:blur(4px);}
        .kpop-note{display:inline-block;animation:noteBounce 1.2s ease-in-out infinite;font-size:11px;}
        @keyframes noteBounce{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-3px) rotate(10deg);}}
        .watch-kpop-text{font-family:'Outfit';font-size:8.5px;font-weight:700;color:var(--pink-600);letter-spacing:0.3px;max-width:130px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

        .watch-equalizer{display:flex;gap:2.5px;align-items:flex-end;height:11px;margin-top:4px;position:relative;z-index:5;}
        .eq-bar{width:3.5px;border-radius:2px;animation:eqAnimate 0.8s ease-in-out infinite;}
        .eq-bar:nth-child(1){background:var(--pink-hot);animation-delay:0s;}
        .eq-bar:nth-child(2){background:var(--pink-500);animation-delay:0.1s;}
        .eq-bar:nth-child(3){background:var(--lavender);animation-delay:0.2s;}
        .eq-bar:nth-child(4){background:var(--mint);animation-delay:0.3s;}
        .eq-bar:nth-child(5){background:var(--gold-text);animation-delay:0.15s;}
        .eq-bar:nth-child(6){background:var(--pink-hot);animation-delay:0.25s;}
        .eq-bar:nth-child(7){background:var(--pink-400);animation-delay:0.05s;}
        @keyframes eqAnimate{0%,100%{height:3px;}50%{height:11px;}}

        .watch-widgets{display:flex;gap:7px;margin-top:5px;position:relative;z-index:5;}
        .watch-widget{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all 0.3s;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);}
        .watch-widget:hover{transform:scale(1.15);}
        .watch-widget:active{transform:scale(0.9);}
        .watch-widget.heart-w{background:rgba(255,228,237,0.8);border:1.5px solid var(--pink-300);}
        .watch-widget.music-w{background:rgba(243,232,255,0.8);border:1.5px solid #DCC8F0;}
        .watch-widget.star-w{background:rgba(254,243,199,0.8);border:1.5px solid #F0D88A;}
        .watch-widget.pulse{animation:widgetPulse 0.5s ease;}
        @keyframes widgetPulse{0%{transform:scale(1);}30%{transform:scale(1.4);}60%{transform:scale(0.9);}100%{transform:scale(1);}}

        .heart-particle{position:absolute;pointer-events:none;font-size:10px;animation:heartBurst 0.8s ease-out forwards;z-index:100;}
        @keyframes heartBurst{0%{opacity:1;transform:translate(0,0) scale(0.5);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.2);}}
        .star-sparkle{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:50;}
        .star-sparkle .sp{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold-light);animation:starSp 0.6s ease-out forwards;}
        @keyframes starSp{0%{opacity:1;transform:scale(0);}50%{opacity:1;transform:scale(1.5);}100%{opacity:0;transform:scale(0);}}

        .face-label{text-align:center;font-family:'Outfit';font-size:11px;color:var(--text-light);margin-top:18px;letter-spacing:3px;text-transform:uppercase;}
        .face-selector{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center;}
        .face-option{width:50px;height:50px;border-radius:16px;border:2px solid var(--pink-200);cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Outfit';font-weight:700;color:var(--text-medium);background:#fff;}
        .face-option:hover{border-color:var(--pink-500);transform:scale(1.08);}
        .face-option.active{border-color:var(--pink-hot);box-shadow:0 4px 15px rgba(255,45,135,0.18);}
        .face-option.rose{background:var(--pink-100);}
        .face-option.lilac{background:var(--lavender);}
        .face-option.minty{background:var(--mint-light);}
        .face-option.golden{background:#FEF3C7;}

        /* ===== WALLPAPER ===== */
        .wallpaper-page{display:flex;flex-direction:column;align-items:center;padding-bottom:30px;}
        .wallpaper-preview{width:260px;height:520px;border-radius:32px;overflow:hidden;position:relative;border:3px solid var(--pink-200);box-shadow:0 12px 40px rgba(255,126,179,0.12);margin-bottom:18px;background:#fff;}
        .wallpaper-canvas{width:100%;height:100%;position:relative;overflow:hidden;}

        .wp-theme-rose-cloud .wallpaper-canvas{background:linear-gradient(180deg,#FFF5F8 0%,#FFE4ED 25%,#FFD6E4 50%,#FFC0D6 75%,#FFE4ED 100%);}
        .wp-theme-pink-stars .wallpaper-canvas{background:linear-gradient(180deg,#FFF0F5 0%,#FFD6E4 30%,#E8D5F5 60%,#FFE4ED 100%);}
        .wp-theme-cherry-blossom .wallpaper-canvas{background:linear-gradient(180deg,#FFF8FA 0%,#FFE4ED 20%,#FFD6E4 50%,#FFC0D6 70%,#FFD6E4 100%);}
        .wp-theme-cotton-candy .wallpaper-canvas{background:linear-gradient(180deg,#FFF0F5 0%,#E8D5F5 30%,#D0F0E0 55%,#FFE4ED 80%,#FFF5F8 100%);}

        /* Characters on wallpaper - semi transparent */
        .wp-chars-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:240px;z-index:2;opacity:0.25;pointer-events:none;filter:saturate(0.6);}

        .floating-heart{position:absolute;animation:floatUp 5s ease-in-out infinite;opacity:0;z-index:3;}
        @keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0.5) rotate(0deg);}15%{opacity:0.6;}85%{opacity:0.45;}100%{opacity:0;transform:translateY(-220px) scale(1.1) rotate(15deg);}}
        .floating-note{position:absolute;animation:noteFloat 6s ease-in-out infinite;opacity:0;z-index:3;}
        @keyframes noteFloat{0%{opacity:0;transform:translateY(0) rotate(0deg);}15%{opacity:0.4;}85%{opacity:0.35;}100%{opacity:0;transform:translateY(-260px) rotate(360deg);}}
        .wp-sparkle{position:absolute;border-radius:50%;animation:wpSparkle 3s ease-in-out infinite;z-index:3;}
        @keyframes wpSparkle{0%,100%{opacity:0;transform:scale(0);}50%{opacity:0.6;transform:scale(1);}}
        .wp-circle{position:absolute;border-radius:50%;border:1.5px solid;animation:circleFloat 10s linear infinite;opacity:0.1;z-index:3;}
        @keyframes circleFloat{from{transform:rotate(0deg) translateX(8px);}to{transform:rotate(360deg) translateX(8px);}}
        .petal{position:absolute;border-radius:50% 0 50% 50%;animation:petalFall 7s ease-in-out infinite;opacity:0;z-index:3;}
        @keyframes petalFall{0%{opacity:0;transform:translateY(-20px) translateX(0) rotate(0deg);}10%{opacity:0.4;}90%{opacity:0.2;}100%{opacity:0;transform:translateY(400px) translateX(60px) rotate(720deg);}}

        .wp-clock{position:absolute;top:45px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;}
        .wp-clock-time{font-family:'Orbitron';font-size:44px;font-weight:900;color:var(--pink-hot);text-shadow:0 1px 8px rgba(255,255,255,0.8),0 2px 15px rgba(255,45,135,0.15);letter-spacing:3px;}
        .wp-clock-date{font-family:'Outfit';font-size:12px;color:var(--text-medium);letter-spacing:3px;text-transform:uppercase;margin-top:3px;font-weight:600;text-shadow:0 1px 4px rgba(255,255,255,0.8);}
        .wp-clock-day{font-family:'Outfit';font-size:10px;color:var(--pink-500);letter-spacing:4px;text-transform:uppercase;margin-top:2px;font-weight:700;text-shadow:0 1px 4px rgba(255,255,255,0.8);}

        .wp-kpop-badge{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;}
        .wp-badge-text{font-family:'Outfit';font-size:28px;font-weight:900;letter-spacing:8px;text-transform:uppercase;color:var(--pink-hot);text-shadow:0 1px 8px rgba(255,255,255,0.7),0 2px 12px rgba(255,45,135,0.15);}
        .wp-badge-sub{font-family:'Outfit';font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--text-medium);text-shadow:0 1px 3px rgba(255,255,255,0.8);}

        .wp-now-playing{position:absolute;bottom:115px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:5px;padding:4px 12px;background:rgba(255,255,255,0.7);border:1.5px solid var(--pink-200);border-radius:18px;backdrop-filter:blur(5px);white-space:nowrap;}
        .wp-now-text{font-family:'Outfit';font-size:8px;font-weight:600;color:var(--pink-600);}

        .wp-theme-selector{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
        .wp-theme-btn{width:56px;height:56px;border-radius:16px;border:2px solid var(--pink-200);cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:8px;font-family:'Outfit';font-weight:700;color:var(--text-medium);background:#fff;}
        .wp-theme-btn:hover{border-color:var(--pink-500);transform:scale(1.08);}
        .wp-theme-btn.active{border-color:var(--pink-hot);box-shadow:0 4px 18px rgba(255,45,135,0.18);}
        .wp-theme-btn .theme-icon{font-size:17px;}
        .wp-theme-btn.rose-cloud{background:linear-gradient(135deg,#FFF5F8,#FFD6E4);}
        .wp-theme-btn.pink-stars{background:linear-gradient(135deg,#FFE4ED,#E8D5F5);}
        .wp-theme-btn.cherry-blossom{background:linear-gradient(135deg,#FFF0F5,#FFC0D6);}
        .wp-theme-btn.cotton-candy{background:linear-gradient(135deg,#E8D5F5,#D0F0E0);}

        .download-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 28px;background:var(--pink-500);border:none;border-radius:30px;color:#fff;font-family:'Outfit';font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;box-shadow:0 6px 25px rgba(255,126,179,0.25);}
        .download-btn:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(255,126,179,0.3);background:var(--pink-hot);}

        @media(min-width:768px){
            .watch-case{width:300px;height:310px;}
            .watch-time-main{font-size:56px;}
            .wallpaper-preview{width:300px;height:600px;}
            .wp-clock-time{font-size:50px;}
        }
    </style>
</head>
<body>

<div class="demo-nav">
    <button class="active" onclick="showSection('clock',this)">SMART CLOCK</button>
    <button onclick="showSection('wallpaper',this)">WALLPAPER</button>
</div>

<!-- ===== SECTION: SMART CLOCK ===== -->
<div class="section active" id="section-clock">
    <div class="section-title">K-Pop Smart Clock</div>
    <div class="section-subtitle">♡ your music companion ♡</div>
    <div class="section-divider"></div>
    <div class="watch-page">
        <div class="watch-outer">
            <div class="watch-band top"></div>
            <div class="watch-case">
                <div class="watch-btn-side"></div>
                <div class="watch-screen">
                    <div class="watch-face" id="watchFace">
                        <!-- Characters as semi-transparent background -->
                        <img class="watch-chars-bg" id="watchCharsImg" alt="">
                        <div class="watch-status-bar">
                            <span>♡</span>
                            <span style="font-weight:800;color:var(--pink-500);font-size:9px;">K-POP</span>
                            <span id="watchBattery">100%</span>
                        </div>
                        <div class="watch-time-main" id="watchTime">00:00</div>
                        <div class="watch-seconds" id="watchSeconds">:00</div>
                        <div class="watch-date" id="watchDate">LOADING...</div>
                        <div class="watch-day" id="watchDay">LOADING...</div>
                        <div class="watch-kpop-bar">
                            <span class="kpop-note">♪</span>
                            <span class="watch-kpop-text" id="nowPlaying">NOW PLAYING...</span>
                        </div>
                        <div class="watch-equalizer" id="equalizer">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                        <div class="watch-widgets">
                            <div class="watch-widget heart-w" id="btnHeart" onclick="handleHeart()">💗</div>
                            <div class="watch-widget music-w" id="btnMusic" onclick="handleMusic()">🎵</div>
                            <div class="watch-widget star-w" id="btnStar" onclick="handleStar()">⭐</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="watch-band bottom"></div>
        </div>
        <div class="face-label">WATCH FACES</div>
        <div class="face-selector">
            <div class="face-option rose active" onclick="changeWatchFace('rose')">ROSE</div>
            <div class="face-option lilac" onclick="changeWatchFace('lilac')">LILAC</div>
            <div class="face-option minty" onclick="changeWatchFace('minty')">MINT</div>
            <div class="face-option golden" onclick="changeWatchFace('golden')">GOLD</div>
        </div>
    </div>
</div>

<!-- ===== SECTION: WALLPAPER ===== -->
<div class="section" id="section-wallpaper">
    <div class="section-title">K-Pop Phone Wallpaper</div>
    <div class="section-subtitle">♡ customize your screen ♡</div>
    <div class="section-divider"></div>
    <div class="wallpaper-page">
        <div class="wp-theme-selector">
            <div class="wp-theme-btn rose-cloud active" onclick="changeWallpaper('rose-cloud')"><span class="theme-icon">☁️</span><span>ROSE</span></div>
            <div class="wp-theme-btn pink-stars" onclick="changeWallpaper('pink-stars')"><span class="theme-icon">✨</span><span>STARS</span></div>
            <div class="wp-theme-btn cherry-blossom" onclick="changeWallpaper('cherry-blossom')"><span class="theme-icon">🌸</span><span>SAKURA</span></div>
            <div class="wp-theme-btn cotton-candy" onclick="changeWallpaper('cotton-candy')"><span class="theme-icon">🍬</span><span>CANDY</span></div>
        </div>
        <div class="wallpaper-preview wp-theme-rose-cloud" id="wallpaperPreview">
            <div class="wallpaper-canvas" id="wallpaperCanvas">
                <div class="wp-clock">
                    <div class="wp-clock-time" id="wpTime">00:00</div>
                    <div class="wp-clock-date" id="wpDate">LOADING...</div>
                    <div class="wp-clock-day" id="wpDay">LOADING...</div>
                </div>
                <!-- Characters as semi-transparent wallpaper background -->
                <img class="wp-chars-bg" id="wpCharsImg" alt="">
                <div class="wp-now-playing">
                    <span style="font-size:9px;">♪</span>
                    <span class="wp-now-text" id="wpNowPlaying">BLACKPINK - DDU-DU</span>
                </div>
                <div class="wp-kpop-badge">
                    <div class="wp-badge-text">K-POP</div>
                    <div class="wp-badge-sub">♡ LOVE YOURSELF ♡</div>
                </div>
            </div>
        </div>
        <button class="download-btn" onclick="downloadWallpaper()">📥 DOWNLOAD WALLPAPER</button>
    </div>

    function updateClock(){
        var now=new Date();
        var h=String(now.getHours()).padStart(2,'0');
        var m=String(now.getMinutes()).padStart(2,'0');
        var s=String(now.getSeconds()).padStart(2,'0');
        document.getElementById('watchTime').textContent=h+':'+m;
        document.getElementById('watchSeconds').textContent=':'+s;
        document.getElementById('wpTime').textContent=h+':'+m;

        var dateStr=monthNames[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
        var dayStr=dayNamesEn[now.getDay()];

        document.getElementById('watchDate').textContent=dateStr;
        document.getElementById('watchDay').textContent=dayStr;
        document.getElementById('wpDate').textContent=dateStr;
        document.getElementById('wpDay').textContent=dayStr;
        document.getElementById('watchBattery').textContent=Math.max(10,100-now.getMinutes())+'%';
    }

    function rotateSong(){
        currentSongIndex=(currentSongIndex+1)%kpopSongs.length;
        var el=document.getElementById('nowPlaying');
        var wp=document.getElementById('wpNowPlaying');
        el.style.transition='opacity 0.3s';el.style.opacity='0';
        wp.style.transition='opacity 0.3s';wp.style.opacity='0';
        setTimeout(function(){
            el.textContent=kpopSongs[currentSongIndex];el.style.opacity='1';
            wp.textContent=kpopSongs[currentSongIndex];wp.style.opacity='1';
        },300);
    }

    function handleHeart(){
        var btn=document.getElementById('btnHeart');btn.textContent='💖';
        btn.classList.remove('pulse');void btn.offsetWidth;btn.classList.add('pulse');
        var wf=document.getElementById('watchFace');
        var r=btn.getBoundingClientRect(),pr=wf.getBoundingClientRect();
        var cx=r.left-pr.left+r.width/2,cy=r.top-pr.top+r.height/2;
        var em=['💗','💖','💕','♡','🩷'];
        for(var i=0;i<8;i++){
            var p=document.createElement('div');p.className='heart-particle';
            p.textContent=em[Math.floor(Math.random()*em.length)];
            var a=(Math.PI*2/8)*i,d=30+Math.random()*25;
            p.style.left=cx+'px';p.style.top=cy+'px';
            p.style.setProperty('--tx',Math.cos(a)*d+'px');
            p.style.setProperty('--ty',Math.sin(a)*d+'px');
            wf.appendChild(p);(function(el){setTimeout(function(){el.remove();},800);})(p);
        }
        setTimeout(function(){btn.textContent='💗';},600);
    }

    function handleMusic(){
        var btn=document.getElementById('btnMusic');
        musicPlaying=!musicPlaying;
        btn.classList.remove('pulse');void btn.offsetWidth;btn.classList.add('pulse');
        btn.textContent=musicPlaying?'🎵':'⏸️';
        btn.style.background=musicPlaying?'rgba(243,232,255,0.8)':'rgba(255,228,237,0.8)';
        document.querySelectorAll('.eq-bar').forEach(function(b){b.style.animationPlayState=musicPlaying?'running':'paused';});
    }

    function handleStar(){
        var btn=document.getElementById('btnStar');btn.textContent='🌟';
        btn.classList.remove('pulse');void btn.offsetWidth;btn.classList.add('pulse');
        var wf=document.getElementById('watchFace');
        var ov=document.createElement('div');ov.className='star-sparkle';
        for(var i=0;i<12;i++){
            var sp=document.createElement('div');sp.className='sp';
            sp.style.left=(15+Math.random()*70)+'%';sp.style.top=(15+Math.random()*70)+'%';
            sp.style.animationDelay=(Math.random()*0.3)+'s';
            sp.style.width=(3+Math.random()*5)+'px';sp.style.height=sp.style.width;
            sp.style.background=['#F0D88A','#FFD700','#FFF5D6','#FF7EB3'][Math.floor(Math.random()*4)];
            ov.appendChild(sp);
        }
        wf.appendChild(ov);setTimeout(function(){ov.remove();btn.textContent='⭐';},700);
    }

    var currentWpTheme='rose-cloud';
    function changeWallpaper(theme){
        currentWpTheme=theme;
        document.getElementById('wallpaperPreview').className='wallpaper-preview wp-theme-'+theme;
        var canvas=document.getElementById('wallpaperCanvas');
        canvas.querySelectorAll('.wp-dynamic').forEach(function(el){el.remove();});
        genWp(theme,canvas);
        document.querySelectorAll('.wp-theme-btn').forEach(function(b){b.classList.remove('active');});
        document.querySelector('.wp-theme-btn.'+theme).classList.add('active');
    }

    function genWp(theme,canvas){
        var hearts=['💗','💖','💕','🤍','♡'];
        for(var i=0;i<6;i++){var h=document.createElement('div');h.className='floating-heart wp-dynamic';h.textContent=hearts[Math.floor(Math.random()*hearts.length)];h.style.fontSize=(11+Math.random()*12)+'px';h.style.left=(5+Math.random()*90)+'%';h.style.bottom='8%';h.style.animationDelay=(Math.random()*5)+'s';h.style.animationDuration=(4+Math.random()*3)+'s';canvas.appendChild(h);}
        for(var i=0;i<4;i++){var n=document.createElement('div');n.className='floating-note wp-dynamic';n.textContent=['♪','♫','♬','🎵','🎶'][Math.floor(Math.random()*5)];n.style.fontSize=(12+Math.random()*10)+'px';n.style.left=(5+Math.random()*90)+'%';n.style.bottom='5%';n.style.animationDelay=(Math.random()*6)+'s';n.style.animationDuration=(5+Math.random()*3)+'s';canvas.appendChild(n);}
        var scMap={'rose-cloud':['#FF7EB3','#FFD6E4','#fff','#FFC0D6'],'pink-stars':['#C084FC','#FFD6E4','#E8D5F5','#fff'],'cherry-blossom':['#FF7EB3','#FFC0D6','#fff','#FFD6E4'],'cotton-candy':['#A8E6CF','#E8D5F5','#FFD6E4','#F0D88A']};
        var c=scMap[theme]||scMap['rose-cloud'];
        for(var i=0;i<18;i++){var sp=document.createElement('div');sp.className='wp-sparkle wp-dynamic';sp.style.left=Math.random()*100+'%';sp.style.top=Math.random()*100+'%';sp.style.background=c[Math.floor(Math.random()*c.length)];sp.style.animationDelay=(Math.random()*3)+'s';var sz=(3+Math.random()*5)+'px';sp.style.width=sz;sp.style.height=sz;canvas.appendChild(sp);}
        for(var i=0;i<5;i++){var ci=document.createElement('div');ci.className='wp-circle wp-dynamic';var sz=(18+Math.random()*45)+'px';ci.style.width=sz;ci.style.height=sz;ci.style.left=Math.random()*80+'%';ci.style.top=(15+Math.random()*65)+'%';ci.style.borderColor=c[Math.floor(Math.random()*c.length)];ci.style.animationDuration=(8+Math.random()*12)+'s';ci.style.animationDelay=(Math.random()*5)+'s';canvas.appendChild(ci);}
        if(theme==='cherry-blossom'){for(var i=0;i<10;i++){var p=document.createElement('div');p.className='petal wp-dynamic';p.style.left=Math.random()*100+'%';p.style.top='-5%';p.style.background=['#FFD6E4','#FFC0D6','#FFE4ED','#fff'][Math.floor(Math.random()*4)];p.style.animationDelay=(Math.random()*7)+'s';p.style.animationDuration=(5+Math.random()*5)+'s';var sz=(7+Math.random()*7)+'px';p.style.width=sz;p.style.height=sz;canvas.appendChild(p);}}
    }
    genWp('rose-cloud',document.getElementById('wallpaperCanvas'));

    function downloadWallpaper(){
        var cvs=document.createElement('canvas');cvs.width=1080;cvs.height=2340;
        var ctx=cvs.getContext('2d');
        var themes={'rose-cloud':[{p:0,c:'#FFF5F8'},{p:.25,c:'#FFE4ED'},{p:.5,c:'#FFD6E4'},{p:.75,c:'#FFC0D6'},{p:1,c:'#FFE4ED'}],'pink-stars':[{p:0,c:'#FFF0F5'},{p:.3,c:'#FFD6E4'},{p:.6,c:'#E8D5F5'},{p:1,c:'#FFE4ED'}],'cherry-blossom':[{p:0,c:'#FFF8FA'},{p:.2,c:'#FFE4ED'},{p:.5,c:'#FFD6E4'},{p:.7,c:'#FFC0D6'},{p:1,c:'#FFD6E4'}],'cotton-candy':[{p:0,c:'#FFF0F5'},{p:.3,c:'#E8D5F5'},{p:.55,c:'#D0F0E0'},{p:.8,c:'#FFE4ED'},{p:1,c:'#FFF5F8'}]};
        var grad=ctx.createLinearGradient(0,0,0,cvs.height);
        (themes[currentWpTheme]||themes['rose-cloud']).forEach(function(s){grad.addColorStop(s.p,s.c);});
        ctx.fillStyle=grad;ctx.fillRect(0,0,cvs.width,cvs.height);
        var sc=['#FF7EB3','#E8D5F5','#A8E6CF','#F0D88A','#FFD6E4','#fff'];
        for(var i=0;i<70;i++){ctx.beginPath();ctx.arc(Math.random()*cvs.width,Math.random()*cvs.height,Math.random()*5+1,0,Math.PI*2);ctx.fillStyle=sc[Math.floor(Math.random()*sc.length)];ctx.globalAlpha=0.15+Math.random()*0.3;ctx.fill();}
        ctx.globalAlpha=0.1;
        for(var i=0;i<10;i++){ctx.beginPath();ctx.arc(Math.random()*cvs.width,300+Math.random()*1700,20+Math.random()*55,0,Math.PI*2);ctx.strokeStyle=sc[Math.floor(Math.random()*sc.length)];ctx.lineWidth=1.5;ctx.stroke();}
        if(currentWpTheme==='cherry-blossom'){for(var i=0;i<20;i++){ctx.beginPath();ctx.ellipse(Math.random()*cvs.width,Math.random()*cvs.height,14,9,Math.random()*Math.PI,0,Math.PI*2);ctx.fillStyle=['#FFD6E4','#FFC0D6','#FFE4ED'][Math.floor(Math.random()*3)];ctx.globalAlpha=0.2+Math.random()*0.15;ctx.fill();}}

        // Draw characters semi-transparent
        var img=document.getElementById('wpCharsImg');
        ctx.globalAlpha=0.25;
        if(img&&img.complete&&img.naturalWidth>0){var iw=cvs.width*0.8,ih=iw*(img.naturalHeight/img.naturalWidth);ctx.drawImage(img,(cvs.width-iw)/2,(cvs.height-ih)/2,iw,ih);}
        ctx.globalAlpha=1;

        ctx.font='45px serif';var hs=['💗','💖','💕','🤍','♡'];
        for(var i=0;i<10;i++){ctx.globalAlpha=0.2+Math.random()*0.2;ctx.fillText(hs[Math.floor(Math.random()*hs.length)],Math.random()*cvs.width,250+Math.random()*1800);}
        ctx.font='35px serif';var ns=['♪','♫','♬','🎵','🎶'];
        for(var i=0;i<8;i++){ctx.globalAlpha=0.1+Math.random()*0.2;ctx.fillText(ns[Math.floor(Math.random()*ns.length)],Math.random()*cvs.width,200+Math.random()*1900);}
        ctx.globalAlpha=1;

        // Time & date on wallpaper download
        var now=new Date();
        var h=String(now.getHours()).padStart(2,'0'),mi=String(now.getMinutes()).padStart(2,'0');
        ctx.textAlign='center';
        ctx.font='900 130px Orbitron, sans-serif';ctx.fillStyle='#FF2D87';
        ctx.shadowColor='rgba(255,255,255,0.8)';ctx.shadowBlur=15;
        ctx.fillText(h+':'+mi,cvs.width/2,280);
        ctx.font='600 32px Outfit, sans-serif';ctx.fillStyle='#8B6090';
        ctx.fillText(monthNames[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear(),cvs.width/2,330);
        ctx.font='700 26px Outfit, sans-serif';ctx.fillStyle='#FF7EB3';
        ctx.fillText(dayNamesEn[now.getDay()],cvs.width/2,370);
        ctx.shadowBlur=0;

        ctx.font='900 110px Outfit, sans-serif';ctx.fillStyle='#FF2D87';
        ctx.shadowColor='rgba(255,45,135,0.15)';ctx.shadowBlur=20;
        ctx.fillText('K-POP',cvs.width/2,cvs.height-330);ctx.shadowBlur=0;
        ctx.font='400 22px Outfit, sans-serif';ctx.fillStyle='#B89AB8';
        ctx.fillText('\u2661  LOVE YOURSELF  \u2661',cvs.width/2,cvs.height-270);

        ctx.fillStyle='rgba(255,255,255,0.7)';var bw=340,bx=(cvs.width-bw)/2,by=cvs.height-420;
        ctx.beginPath();ctx.roundRect(bx,by,bw,38,19);ctx.fill();
        ctx.font='600 17px Outfit, sans-serif';ctx.fillStyle='#FF5BA0';
        ctx.fillText('\u266A  '+kpopSongs[currentSongIndex],cvs.width/2,by+24);

        var link=document.createElement('a');link.download='kpop-wallpaper-'+currentWpTheme+'.png';link.href=cvs.toDataURL('image/png');link.click();
    }
</script>
</body>
</html>
